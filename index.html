<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeSlap</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <section id="splash">
        <h1>PokéSlap</h1>
        <p>Welcome to PokeSlap!</p>
        <p>Get ready to find your favorite Pokémon!</p>
        <button id="start-app">Start PokeSlap</button>
        <div class="pokeball-splash"></div>
    </section>
    <nav id="navbar" class="hidden"></nav>
    <section id="main" class="hidden">
        <div id="loading" class="hidden">Loading Pokémon...</div>
        <div id="search-filter-wrapper">
            <div id="top-controls">
                <input type="text" id="search-input" placeholder="Search Pokémon..." />
                <label for="sort-select" class="control-label">Sort:</label>
                <select id="sort-select">
                    <option value="id">ID</option>
                    <option value="name">Name</option>
                    <option value="hp">HP</option>
                    <option value="attack">Attack</option>
                    <option value="defense">Defense</option>
                </select>
                <label for="sort-order" class="control-label">Order:</label>
                <select id="sort-order">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
            </div>
            <div id="type-filters">
                <button class="type-btn active" data-type="all">All</button>
                <button class="type-btn" data-type="fire">Fire</button>
                <button class="type-btn" data-type="water">Water</button>
                <button class="type-btn" data-type="grass">Grass</button>
                <button class="type-btn" data-type="electric">Electric</button>
                <button class="type-btn" data-type="psychic">Psychic</button>
                <button class="type-btn" data-type="normal">Normal</button>
                <button class="type-btn" data-type="fighting">Fighting</button>
                <button class="type-btn" data-type="poison">Poison</button>
                <button class="type-btn" data-type="ground">Ground</button>
                <button class="type-btn" data-type="rock">Rock</button>
                <button class="type-btn" data-type="bug">Bug</button>
                <button class="type-btn" data-type="ghost">Ghost</button>
                <button class="type-btn" data-type="dragon">Dragon</button>
            </div>
        </div>
        <div id="pokemon-grid"></div>
        <button id="load-more-btn" class="hidden">Load More</button>
    </section>
    <section id="favorites" class="hidden">
        <div id="search-filter-wrapper-fav">
            <div id="top-controls-fav">
                <input type="text" id="search-input-fav" placeholder="Search Pokémon..." />
                <label for="sort-select-fav" class="control-label">Sort:</label>
                <select id="sort-select-fav">
                    <option value="id">ID</option>
                    <option value="name">Name</option>
                    <option value="hp">HP</option>
                    <option value="attack">Attack</option>
                    <option value="defense">Defense</option>
                </select>
                <label for="sort-order-fav" class="control-label">Order:</label>
                <select id="sort-order-fav">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
            </div>
            <div id="type-filters-fav">
                <button class="type-btn active" data-type="all">All</button>
                <button class="type-btn" data-type="fire">Fire</button>
                <button class="type-btn" data-type="water">Water</button>
                <button class="type-btn" data-type="grass">Grass</button>
                <button class="type-btn" data-type="electric">Electric</button>
                <button class="type-btn" data-type="psychic">Psychic</button>
                <button class="type-btn" data-type="normal">Normal</button>
                <button class="type-btn" data-type="fighting">Fighting</button>
                <button class="type-btn" data-type="poison">Poison</button>
                <button class="type-btn" data-type="ground">Ground</button>
                <button class="type-btn" data-type="rock">Rock</button>
                <button class="type-btn" data-type="bug">Bug</button>
                <button class="type-btn" data-type="ghost">Ghost</button>
                <button class="type-btn" data-type="dragon">Dragon</button>
            </div>
        </div>
        <div id="favorites-grid"></div>
    </section>
    <script type="module" src="js/main.js"></script>
</body>

</html>
